<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Học vui mỗi ngày</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    min-height: 100vh;
    font-family: "Segoe UI", Tahoma, sans-serif;
    background: linear-gradient(135deg, #a8e6cf 0%, #ffd3b6 100%);
    color: #2d3436;
}

header {
    background: #ff8b94;
    padding: 20px;
    text-align: center;
    color: #fff;
    font-size: clamp(24px, 4vw, 32px);
    font-weight: 700;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
}

.container {
    max-width: 960px;
    margin: 30px auto;
    padding: 0 20px 30px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.book-item {
    background: rgba(255, 248, 220, 0.95);
    border-radius: 18px;
    padding: 16px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.1);
}

.book-type {
    flex: 1;
    color: #666;
}

.book-title {
    flex: 2;
    text-align: center;
    font-weight: 700;
    font-size: 18px;
}

.book-action {
    flex: 1;
    text-align: right;
}

.btn-open,
.btn-nav,
.btn-close {
    border: none;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
}

.btn-open {
    padding: 10px 22px;
    border-radius: 999px;
    background: #6c5ce7;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
}

.btn-open:hover,
.btn-nav:hover,
.btn-close:hover {
    transform: translateY(-1px);
}

.btn-open:hover {
    background: #5a4bd1;
}

#viewer {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
    background: rgba(8, 11, 18, 0.96);
}

#viewer.active {
    display: block;
}

#viewer-inner {
    width: 100%;
    height: 100%;
    padding: 24px 20px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
}

.btn-close {
    position: fixed;
    top: 18px;
    right: 20px;
    z-index: 10001;
    background: #ff4757;
    color: #fff;
    padding: 11px 18px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
}

.btn-close:hover {
    background: #e03e4e;
}

#loading-msg {
    color: #fff;
    font-size: 20px;
    display: none;
}

#viewer-content {
    width: min(1400px, 100%);
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(320px, 0.9fr) minmax(320px, 1.1fr);
    gap: 20px;
    align-items: stretch;
}

.viewer-panel {
    min-height: 0;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    backdrop-filter: blur(6px);
    overflow: hidden;
}

.viewer-panel.hidden {
    display: none;
}

.panel-header {
    padding: 16px 20px;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.panel-body {
    height: calc(100% - 58px);
    padding: 18px;
}

#video-panel .panel-body {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.media-frame {
    flex: 1;
    min-height: 320px;
    width: 100%;
    border: 0;
    border-radius: 18px;
    background: #000;
}

.media-empty {
    flex: 1;
    min-height: 220px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    color: rgba(255, 255, 255, 0.9);
    background: rgba(255, 255, 255, 0.08);
}

#flipbook-stage {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}

#flipbook-container {
    display: none;
    margin: 0 auto;
    align-items: center;
    justify-content: center;
    gap: 0;
    box-shadow: 0 22px 70px rgba(0, 0, 0, 0.45);
    background: #dfe6e9;
    border-radius: 8px;
    overflow: hidden;
}

#flipbook-container.active {
    display: flex;
}

.page-sheet {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.05);
}

.page-sheet.empty {
    background: linear-gradient(135deg, #f1f2f6, #dfe4ea);
}

.page-sheet canvas {
    display: block;
}

#nav-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
}

.btn-nav {
    min-width: 120px;
    padding: 10px 20px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.16);
    color: #fff;
    border: 2px solid rgba(255, 255, 255, 0.32);
    font-size: 15px;
    font-weight: 600;
}

.btn-nav:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
}

#page-info {
    min-width: 150px;
    color: #fff;
    font-size: 15px;
    text-align: center;
    font-weight: 600;
}

@media (max-width: 720px) {
    .book-item {
        flex-direction: column;
        align-items: stretch;
    }

    .book-title,
    .book-type,
    .book-action {
        text-align: center;
    }

    .btn-open,
    .btn-nav {
        width: 100%;
    }

    #viewer-inner {
        padding-top: 70px;
    }
}

@media (max-width: 1100px) {
    #viewer-content {
        grid-template-columns: 1fr;
    }

    .panel-body {
        height: auto;
    }

    #video-panel .panel-body {
        min-height: 360px;
    }
}
</style>
</head>
<body>

<header>🎉 Học vui mỗi ngày 🎉</header>
<div class="container" id="posts"></div>

<div id="viewer">
    <button class="btn-close" type="button" onclick="closeViewer()">Đóng</button>
    <div id="viewer-inner">
        <div id="loading-msg">Đang tải sách...</div>
        <div id="viewer-content">
            <section class="viewer-panel hidden" id="video-panel">
                <div class="panel-header">Video</div>
                <div class="panel-body" id="video-body"></div>
            </section>
            <section class="viewer-panel hidden" id="book-panel">
                <div class="panel-header">Story book</div>
                <div class="panel-body">
                    <div id="flipbook-stage">
                        <div id="flipbook-container"></div>
                    </div>
                </div>
            </section>
        </div>
        <div id="nav-bar">
            <button class="btn-nav" id="prev-btn" type="button" onclick="prevPage()">◀ Trang trước</button>
            <span id="page-info"></span>
            <button class="btn-nav" id="next-btn" type="button" onclick="nextPage()">Trang sau ▶</button>
        </div>
    </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

let pdfDoc = null;
let totalPages = 0;
let pageWidth = 0;
let pageHeight = 0;
let spreadMode = "double";
let currentPdfUrl = "";
let currentVideoUrl = "";
let resizeTimer = null;
let currentPage = 1;
let renderedPages = new Set();

function getDisplayMode() {
    return window.innerWidth < 900 ? "single" : "double";
}

function buildPdfUrl(pdfUrl) {
    return pdfUrl.startsWith("http") ? pdfUrl : new URL(pdfUrl, window.location.origin).toString();
}

function buildMediaUrl(url) {
    if (!url) {
        return "";
    }

    return url.startsWith("http") ? url : new URL(url, window.location.origin).toString();
}

function isPdfUrl(url) {
    return /\.pdf(?:[?#].*)?$/i.test(url || "");
}

function isYouTubeUrl(url) {
    return /youtube\.com|youtu\.be/i.test(url || "");
}

function toYouTubeEmbed(url) {
    try {
        const parsed = new URL(url);
        if (parsed.hostname.includes("youtu.be")) {
            const id = parsed.pathname.replace(/\//g, "");
            return id ? "https://www.youtube.com/embed/" + id : "";
        }

        if (parsed.hostname.includes("youtube.com")) {
            const id = parsed.searchParams.get("v");
            if (id) {
                return "https://www.youtube.com/embed/" + id;
            }

            const match = parsed.pathname.match(/\/embed\/([^/]+)/);
            return match ? "https://www.youtube.com/embed/" + match[1] : "";
        }
    } catch (error) {
        console.warn("Link YouTube không hợp lệ:", url, error);
    }

    return "";
}

function showPanel(id, visible) {
    document.getElementById(id).classList.toggle("hidden", !visible);
}

function updateViewerLayout(hasVideo, hasBook) {
    const content = document.getElementById("viewer-content");
    if (hasVideo && hasBook) {
        content.style.gridTemplateColumns = window.innerWidth <= 1100
            ? "1fr"
            : "minmax(320px, 0.9fr) minmax(320px, 1.1fr)";
    } else {
        content.style.gridTemplateColumns = "minmax(320px, 1fr)";
    }
}

function renderVideo(url) {
    const body = document.getElementById("video-body");
    body.innerHTML = "";

    if (!url) {
        body.innerHTML = '<div class="media-empty">Bài này chưa có video.</div>';
        return;
    }

    if (isYouTubeUrl(url)) {
        const iframe = document.createElement("iframe");
        iframe.className = "media-frame";
        iframe.src = toYouTubeEmbed(url);
        iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
        iframe.allowFullscreen = true;
        iframe.referrerPolicy = "strict-origin-when-cross-origin";
        body.appendChild(iframe);
        return;
    }

    const video = document.createElement("video");
    video.className = "media-frame";
    video.src = url;
    video.controls = true;
    video.preload = "metadata";
    body.appendChild(video);
}

async function load() {
    try {
        const res = await fetch("/api/posts?time=" + Date.now());
        const data = await res.json();
        const list = document.getElementById("posts");
        list.innerHTML = "";

        data.forEach((post) => {
            const item = document.createElement("div");
            item.className = "book-item";

            const type = document.createElement("div");
            type.className = "book-type";
            type.textContent = "📘 Story book";

            const title = document.createElement("div");
            title.className = "book-title";
            title.textContent = post.title;

            const action = document.createElement("div");
            action.className = "book-action";

            const button = document.createElement("button");
            button.className = "btn-open";
            button.type = "button";
            button.textContent = post.videoUrl && post.pdfUrl ? "Xem video + truyện" : post.videoUrl ? "Xem video" : "Xem truyện";
            button.addEventListener("click", () => openPost(post));

            action.appendChild(button);
            item.append(type, title, action);
            list.appendChild(item);
        });
    } catch (error) {
        console.warn("Không tải được danh sách:", error);
    }
}

function openPost(post) {
    currentPdfUrl = isPdfUrl(post.pdfUrl) ? buildPdfUrl(post.pdfUrl) : "";
    currentVideoUrl = buildMediaUrl(post.videoUrl);
    const hasBook = !!currentPdfUrl;
    const hasVideo = !!currentVideoUrl;

    showPanel("video-panel", hasVideo);
    showPanel("book-panel", hasBook);
    updateViewerLayout(hasVideo, hasBook);
    renderVideo(currentVideoUrl);

    document.getElementById("viewer").classList.add("active");
    document.body.style.overflow = "hidden";

    if (hasBook) {
        initFlipbook(currentPdfUrl, 1);
    } else {
        destroyFlipbook();
        document.getElementById("loading-msg").style.display = "none";
        document.getElementById("page-info").textContent = hasVideo ? "Đang phát video" : "Không có story book";
        setNavDisabled(true, true);
    }
}

function destroyFlipbook() {
    const container = document.getElementById("flipbook-container");
    container.classList.remove("active");
    container.innerHTML = "";
    container.removeAttribute("style");
    renderedPages = new Set();
}

async function initFlipbook(url, startPage = 1) {
    const loading = document.getElementById("loading-msg");
    const container = document.getElementById("flipbook-container");

    destroyFlipbook();
    loading.style.display = "block";
    setNavDisabled(true, true);
    document.getElementById("page-info").textContent = "";

    try {
        pdfDoc = await pdfjsLib.getDocument(url).promise;
        totalPages = pdfDoc.numPages;
        spreadMode = getDisplayMode();
        currentPage = Math.min(Math.max(startPage, 1), totalPages);

        const firstPage = await pdfDoc.getPage(1);
        const viewport = firstPage.getViewport({ scale: 1 });
        const maxHeight = Math.max(window.innerHeight - 170, 280);
        const usableWidth = Math.max(window.innerWidth - 80, 280);
        const pageSlots = spreadMode === "double" ? 2 : 1;
        const maxPageWidth = usableWidth / pageSlots;
        const scale = Math.min(maxHeight / viewport.height, maxPageWidth / viewport.width);

        pageWidth = Math.max(140, Math.round(viewport.width * scale));
        pageHeight = Math.max(200, Math.round(viewport.height * scale));

        loading.style.display = "none";

        const width = spreadMode === "double" ? pageWidth * 2 : pageWidth;
        container.style.width = width + "px";
        container.style.height = pageHeight + "px";
        container.classList.add("active");

        await renderCurrentSpread();
    } catch (error) {
        loading.style.display = "none";
        pdfDoc = null;
        console.error("Lỗi PDF:", error);
        alert("Không thể tải sách.\n" + error.message);
    }
}

function createSheet(pageNumber) {
    const sheet = document.createElement("div");
    sheet.className = "page-sheet" + (pageNumber ? "" : " empty");
    sheet.style.width = pageWidth + "px";
    sheet.style.height = pageHeight + "px";

    if (!pageNumber) {
        return sheet;
    }

    const canvas = document.createElement("canvas");
    canvas.id = "cv-" + pageNumber;
    canvas.style.width = pageWidth + "px";
    canvas.style.height = pageHeight + "px";
    sheet.appendChild(canvas);
    return sheet;
}

function getCurrentSpreadPages() {
    if (spreadMode === "single") {
        return [currentPage];
    }

    if (currentPage <= 1) {
        return [1];
    }

    if (currentPage >= totalPages) {
        return totalPages % 2 === 0 ? [totalPages - 1, totalPages] : [totalPages];
    }

    const leftPage = currentPage % 2 === 0 ? currentPage : currentPage - 1;
    return [leftPage, Math.min(leftPage + 1, totalPages)];
}

async function renderPageIntoCanvas(pageNumber) {
    if (!pdfDoc || pageNumber < 1 || pageNumber > totalPages) {
        return;
    }

    const canvas = document.getElementById("cv-" + pageNumber);
    if (!canvas || renderedPages.has(pageNumber) || canvas.dataset.rendering === "1") {
        return;
    }

    canvas.dataset.rendering = "1";

    try {
        const page = await pdfDoc.getPage(pageNumber);
        const baseViewport = page.getViewport({ scale: 1 });
        const outputScale = window.devicePixelRatio || 1.5;
        const renderScale = Math.min(
            (pageWidth * outputScale) / baseViewport.width,
            (pageHeight * outputScale) / baseViewport.height
        );
        const viewport = page.getViewport({ scale: renderScale });

        canvas.width = Math.round(viewport.width);
        canvas.height = Math.round(viewport.height);

        const context = canvas.getContext("2d");
        await page.render({ canvasContext: context, viewport }).promise;

        renderedPages.add(pageNumber);
    } catch (error) {
        console.warn("renderPage lỗi trang", pageNumber, error);
    } finally {
        delete canvas.dataset.rendering;
    }
}

async function renderCurrentSpread() {
    const container = document.getElementById("flipbook-container");
    const pages = getCurrentSpreadPages();

    container.innerHTML = "";

    if (spreadMode === "double" && pages.length === 1) {
        if (pages[0] === 1) {
            container.appendChild(createSheet(null));
            container.appendChild(createSheet(1));
        } else {
            container.appendChild(createSheet(pages[0]));
            container.appendChild(createSheet(null));
        }
    } else {
        pages.forEach((pageNumber) => container.appendChild(createSheet(pageNumber)));
    }

    await Promise.all(pages.map((pageNumber) => renderPageIntoCanvas(pageNumber)));
    updatePageInfo();
    updateNavButtons();
}

function updatePageInfo() {
    const visible = getCurrentSpreadPages();
    const label = visible.length > 1
        ? "Trang " + visible[0] + " - " + visible[visible.length - 1] + " / " + totalPages
        : "Trang " + visible[0] + " / " + totalPages;

    document.getElementById("page-info").textContent = label;
}

function updateNavButtons() {
    const visible = getCurrentSpreadPages();
    const first = visible[0];
    const last = visible[visible.length - 1];
    setNavDisabled(first <= 1, last >= totalPages);
}

function setNavDisabled(prevDisabled, nextDisabled) {
    document.getElementById("prev-btn").disabled = prevDisabled;
    document.getElementById("next-btn").disabled = nextDisabled;
}

function prevPage() {
    if (!pdfDoc || !currentPdfUrl) {
        return;
    }

    if (spreadMode === "single") {
        currentPage = Math.max(1, currentPage - 1);
    } else if (currentPage <= 2) {
        currentPage = 1;
    } else {
        currentPage -= 2;
    }

    renderCurrentSpread();
}

function nextPage() {
    if (!pdfDoc || !currentPdfUrl) {
        return;
    }

    if (spreadMode === "single") {
        currentPage = Math.min(totalPages, currentPage + 1);
    } else if (currentPage <= 1) {
        currentPage = totalPages >= 2 ? 2 : 1;
    } else {
        currentPage = Math.min(totalPages, currentPage + 2);
    }

    renderCurrentSpread();
}

function closeViewer() {
    document.getElementById("viewer").classList.remove("active");
    document.body.style.overflow = "";
    destroyFlipbook();
    pdfDoc = null;
    totalPages = 0;
    currentPdfUrl = "";
    currentVideoUrl = "";
    currentPage = 1;
    showPanel("video-panel", false);
    showPanel("book-panel", false);
    document.getElementById("video-body").innerHTML = "";
    document.getElementById("loading-msg").style.display = "none";
    document.getElementById("page-info").textContent = "";
}

window.addEventListener("resize", () => {
    if (!document.getElementById("viewer").classList.contains("active")) {
        return;
    }

    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
        updateViewerLayout(!!currentVideoUrl, !!currentPdfUrl);
        if (currentPdfUrl) {
            initFlipbook(currentPdfUrl, currentPage);
        }
    }, 250);
});

document.addEventListener("keydown", (event) => {
    if (!document.getElementById("viewer").classList.contains("active")) {
        return;
    }

    if (event.key === "Escape") {
        closeViewer();
    }

    if (event.key === "ArrowLeft") {
        prevPage();
    }

    if (event.key === "ArrowRight") {
        nextPage();
    }
});

load();
</script>

</body>
</html>
