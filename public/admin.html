<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Admin - Thư viện</title>
  <style>
    /* ... Giữ nguyên CSS cũ của bạn ... */
    body { font-family: Arial; background: #f5f5f5; text-align: center; }
    h1 { color: #ff6b6b; }
    form { background: white; padding: 15px; margin: 15px auto; width: 300px; border-radius: 10px; box-shadow: 0 0 10px #ccc; }
    input { width: 90%; padding: 8px; margin: 5px; }
    button { padding: 8px 15px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { opacity: 0.8; }
    .list { margin-top: 20px; }
    .item { background: white; margin: 10px; padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; width: 50%; margin: 10px auto; }
    .btn-delete { background: #ff4757; }
  </style>
</head>

<body>

<h1>🔧 Admin quản lý nội dung</h1>

<form id="bookForm">
  <h3>Thêm sách</h3>
  <input type="text" id="bookTitle" placeholder="Tên sách" required>
  <input type="file" id="bookFile" accept="application/pdf" required>
  <button type="submit" id="btnBook">Upload sách</button>
</form>

<form id="videoForm">
  <h3>Thêm video</h3>
  <input type="text" id="videoTitle" placeholder="Tên video" required>
  <input type="file" id="videoFile" accept="video/*" required>
  <button type="submit" id="btnVideo">Upload video</button>
</form>

<div class="list">
  <h2>Danh sách sách</h2>
  <div id="bookList"></div>

  <h2>Danh sách video</h2>
  <div id="videoList"></div>
</div>

<script>
const API = "/api";

// --- XỬ LÝ SÁCH ---
document.getElementById("bookForm").onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById("btnBook");
  
  // Lấy giá trị chính xác và gán tên biến tường minh
  const bookTitleValue = document.getElementById("bookTitle").value;
  const bookFileFile = document.getElementById("bookFile").files[0];

  const formData = new FormData();
  formData.append("title", bookTitleValue);
  formData.append("pdf", bookFileFile);

  btn.innerText = "Đang tải lên...";
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/books`, { method: "POST", body: formData });
    if (res.ok) {
      alert(`Upload sách "${bookTitleValue}" thành công!`);
      document.getElementById("bookForm").reset();
      loadBooks();
    }
  } catch (err) {
    alert("Lỗi upload sách!");
  } finally {
    btn.innerText = "Upload sách";
    btn.disabled = false;
  }
};

// --- XỬ LÝ VIDEO ---
document.getElementById("videoForm").onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById("btnVideo");

  // Tên biến được đặt riêng biệt để tránh ReferenceError
  const videoTitleValue = document.getElementById("videoTitle").value;
  const videoFileFile = document.getElementById("videoFile").files[0];

  const formData = new FormData();
  formData.append("title", videoTitleValue);
  formData.append("video", videoFileFile);

  btn.innerText = "Đang tải lên...";
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/videos`, { method: "POST", body: formData });
    if (res.ok) {
      alert(`Upload video "${videoTitleValue}" thành công!`);
      document.getElementById("videoForm").reset();
      loadVideos();
    }
  } catch (err) {
    alert("Lỗi upload video!");
  } finally {
    btn.innerText = "Upload video";
    btn.disabled = false;
  }
};

// --- LOAD DỮ LIỆU ---
async function loadBooks() {
  const res = await fetch(API + "/books");
  const data = await res.json();
  const list = document.getElementById("bookList");
  list.innerHTML = data.map(b => `
    <div class="item">
      <span>${b.title}</span>
      <button class="btn-delete" onclick="deleteItem('books', '${b._id}')">Xóa</button>
    </div>
  `).join('');
}

async function loadVideos() {
  const res = await fetch(API + "/videos");
  const data = await res.json();
  const list = document.getElementById("videoList");
  list.innerHTML = data.map(v => `
    <div class="item">
      <span>${v.title}</span>
      <button class="btn-delete" onclick="deleteItem('videos', '${v._id}')">Xóa</button>
    </div>
  `).join('');
}

// Hàm xóa chung cho gọn code
async function deleteItem(type, id) {
  if(confirm("Bạn có chắc chắn muốn xóa?")) {
    await fetch(`${API}/${type}/${id}`, { method: "DELETE" });
    type === 'books' ? loadBooks() : loadVideos();
  }
}

loadBooks();
loadVideos();
</script>

</body>
</html>
