<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đọc sách</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body {
  margin: 0;
  background: linear-gradient(to bottom, #a1c4fd, #c2e9fb);
  font-family: "Comic Sans MS", sans-serif;
}

/* nút thoát */
#exitBtn {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #ff6b6b;
  color: white;
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  font-size: 18px;
  cursor: pointer;
  z-index: 999;
}

/* nút scroll */
.scrollBtn {
  position: fixed;
  right: 10px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  font-size: 18px;
  cursor: pointer;
  z-index: 999;
}

#scrollTop {
  bottom: 70px;
}

#scrollBottom {
  bottom: 20px;
}

/* container */
#reader {
  padding: 20px;
}

/* từng trang */
.page {
  background: white;
  margin: 20px auto;
  padding: 10px;
  border-radius: 20px;
  width: 80%;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  transition: transform 0.3s;
}

.page:hover {
  transform: scale(1.02);
}

canvas {
  width: 100%;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- nút -->
<button id="exitBtn" onclick="goBack()">✖</button>
<button id="scrollTop" class="scrollBtn">⬆</button>
<button id="scrollBottom" class="scrollBtn">⬇</button>

<div id="reader"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

function goBack() {
  window.location.href = "/";
}

const urlParams = new URLSearchParams(window.location.search);
const pdfUrl = urlParams.get("pdf");

const reader = document.getElementById("reader");

pdfjsLib.getDocument(pdfUrl).promise.then(async (pdf) => {

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const viewport = page.getViewport({ scale: 1.5 });
    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({ canvasContext: ctx, viewport }).promise;

    const div = document.createElement("div");
    div.className = "page";
    div.appendChild(canvas);

    reader.appendChild(div);
  }
});

/// scroll lên
document.getElementById("scrollTop").onclick = () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
};

/// scroll xuống
document.getElementById("scrollBottom").onclick = () => {
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
};
</script>

</body>
</html>
